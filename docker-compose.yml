version: "3.9"

services:
  api:
    build: .
    container_name: smartfault-api
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models
      - ./data:/app/data
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  dashboard:
    image: python:3.10-slim
    container_name: smartfault-dashboard
    working_dir: /app
    volumes:
      - .:/app
    command: bash -c "pip install -q streamlit plotly pandas numpy requests && streamlit run dashboard/app.py --server.port 8501 --server.address 0.0.0.0"
    ports:
      - "8501:8501"
    depends_on:
      - api
    restart: unless-stopped
