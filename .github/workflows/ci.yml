name: SmartFault AI — CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    name: Lint & Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pytest pytest-asyncio httpx
          pip install fastapi uvicorn pydantic numpy pandas scikit-learn xgboost

      # - name: Lint with flake8
      #   run: |
      #     flake8 api/ models/ data/ --max-line-length=110 --ignore=E203,W503

      # - name: Run API tests
      #   run: |
      #     pytest tests/ -v --tb=short

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t smartfault-ai:${{ github.sha }} .

      - name: Smoke test container
        run: |
          docker run -d -p 8000:8000 --name test-api smartfault-ai:${{ github.sha }}
          sleep 10
          curl -f http://localhost:8000/ || exit 1
          docker stop test-api
